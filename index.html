<div id="wrapper-cc" style="all: initial;">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap');
        
        #main-cc {
            position: fixed !important; inset: 0 !important; background: #080808 !important;
            display: flex !important; justify-content: center !important; align-items: center !important;
            z-index: 999999999 !important; font-family: 'Inter', sans-serif !important;
            margin: 0 !important; padding: 0 !important; overflow: hidden !important;
        }

        /* UKURAN BARU: Jauh lebih besar & elegan */
        .card-cc {
            width: 80%; /* Mengikuti lebar layar HP */
            max-width: 380px; /* Batas maksimal agar tidak terlalu lebar di laptop */
            padding: 70px 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 40px;
            text-align: center; 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); 
            position: absolute; 
            z-index: 5;
            opacity: 0; 
            transform: scale(0.8) translateY(40px);
            transition: all 2.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .card-cc.active { 
            opacity: 1; 
            transform: scale(1) translateY(0); 
        }

        /* Visualizer lebih tinggi */
        .visualizer-cc { 
            display: flex; justify-content: center; gap: 8px; height: 35px; margin-bottom: 45px; 
        }
        .bar-cc { 
            width: 4px; background: #ffffff; opacity: 0.8; animation: wave-cc 1.2s infinite ease-in-out; 
        }
        @keyframes wave-cc { 
            0%, 100% { height: 10px; } 50% { height: 35px; } 
        }

        /* Judul Jauh Lebih Besar */
        .title-cc { 
            font-size: 1.4rem; 
            letter-spacing: 7px; 
            text-transform: uppercase; 
            color: #fff !important; 
            margin: 0; 
            font-weight: 300;
        }
        .subtitle-cc { 
            font-size: 0.8rem; 
            letter-spacing: 5px; 
            margin-top: 20px; 
            opacity: 0.4; 
            text-transform: uppercase; 
            color: #fff !important; 
        }

        /* Tombol Masuk */
        #overlay-cc { 
            position: absolute; inset: 0; background: #080808; 
            z-index: 100; display: flex; justify-content: center; 
            align-items: center; transition: opacity 2s cubic-bezier(0.65, 0, 0.35, 1); 
        }

        .btn-cc { 
            background: none; border: 1px solid rgba(255,255,255,0.3); 
            color: white; padding: 22px 55px;
            font-size: 1rem; letter-spacing: 6px; 
            text-transform: uppercase; border-radius: 100px; 
            cursor: pointer; transition: 0.6s cubic-bezier(0.22, 1, 0.36, 1); 
        }
        .btn-cc:hover { 
            background: white; color: black; transform: scale(1.1);
        }
    </style>

    <div id="main-cc">
        <div id="overlay-cc"><button class="btn-cc" onclick="goCC()">Experience</button></div>
        <div class="card-cc" id="c-cc">
            <div class="visualizer-cc">
                <div class="bar-cc" style="animation-delay:0.1s"></div>
                <div class="bar-cc" style="animation-delay:0.3s"></div>
                <div class="bar-cc" style="animation-delay:0.2s"></div>
                <div class="bar-cc" style="animation-delay:0.4s"></div>
            </div>
            <h1 class="title-cc">Peta Tak Bertuan</h1>
            <p class="subtitle-cc">Titik Nol</p>
        </div>
        <audio id="a-cc" loop><source src="https://files.catbox.moe/ev5src.mp3" type="audio/mpeg"></audio>
    </div>

    <script>
        function goCC() {
            var a = document.getElementById('a-cc');
            var o = document.getElementById('overlay-cc');
            var c = document.getElementById('c-cc');
            a.play().catch(function(){ a.load(); a.play(); });
            o.style.opacity = '0';
            setTimeout(function(){ c.classList.add('active'); }, 600);
            setTimeout(function(){ o.style.display = 'none'; }, 2500);
        }
    </script>
</div>
