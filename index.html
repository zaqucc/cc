<div id="wrapper-cc" style="all: initial;">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap');
        
        #main-cc {
            position: fixed !important; inset: 0 !important; background: #080808 !important;
            display: flex !important; justify-content: center !important; align-items: center !important;
            z-index: 999999999 !important; font-family: 'Inter', sans-serif !important;
            margin: 0 !important; padding: 0 !important; overflow: hidden !important;
        }

        /* Ukuran Card yang sudah dibesarkan dan responsif */
        .card-cc {
            width: 280px; /* Ukuran lebih proporsional */
            padding: 50px 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 32px;
            text-align: center; 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            position: absolute; 
            z-index: 5;
            opacity: 0; 
            transform: scale(0.8) translateY(30px);
            transition: all 2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Responsif untuk layar lebih besar (Laptop) */
        @media (min-width: 768px) {
            .card-cc {
                width: 320px;
                padding: 60px 40px;
            }
        }

        .card-cc.active { 
            opacity: 1; 
            transform: scale(1) translateY(0); 
        }

        /* Visualizer yang lebih terlihat */
        .visualizer-cc { 
            display: flex; justify-content: center; gap: 6px; height: 25px; margin-bottom: 35px; 
        }
        .bar-cc { 
            width: 3px; background: #ffffff; opacity: 0.7; animation: wave-cc 1s infinite ease-in-out; 
        }
        @keyframes wave-cc { 
            0%, 100% { height: 8px; } 50% { height: 25px; } 
        }

        .title-cc { 
            font-size: 1.1rem; /* Tulisan diperbesar */
            letter-spacing: 5px; 
            text-transform: uppercase; 
            color: #fff !important; 
            margin: 0; 
            font-weight: 400;
        }
        .subtitle-cc { 
            font-size: 0.7rem; 
            letter-spacing: 4px; 
            margin-top: 15px; 
            opacity: 0.4; 
            text-transform: uppercase; 
            color: #fff !important; 
        }

        #overlay-cc { 
            position: absolute; inset: 0; background: #080808; 
            z-index: 100; display: flex; justify-content: center; 
            align-items: center; transition: opacity 1.8s cubic-bezier(0.65, 0, 0.35, 1); 
        }

        .btn-cc { 
            background: none; border: 1px solid rgba(255,255,255,0.2); 
            color: white; padding: 18px 45px; /* Tombol diperbesar */
            font-size: 0.85rem; letter-spacing: 5px; 
            text-transform: uppercase; border-radius: 100px; 
            cursor: pointer; transition: 0.5s cubic-bezier(0.22, 1, 0.36, 1); 
        }
        .btn-cc:hover { 
            background: white; color: black; transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
    </style>

    <div id="main-cc">
        <div id="overlay-cc"><button class="btn-cc" onclick="goCC()">Experience</button></div>
        <div class="card-cc" id="c-cc">
            <div class="visualizer-cc">
                <div class="bar-cc" style="animation-delay:0.1s"></div>
                <div class="bar-cc" style="animation-delay:0.3s"></div>
                <div class="bar-cc" style="animation-delay:0.2s"></div>
                <div class="bar-cc" style="animation-delay:0.4s"></div>
            </div>
            <h1 class="title-cc">Peta Tak Bertuan</h1>
            <p class="subtitle-cc">Titik Nol</p>
        </div>
        <audio id="a-cc" loop><source src="https://files.catbox.moe/ev5src.mp3" type="audio/mpeg"></audio>
    </div>

    <script>
        function goCC() {
            var a = document.getElementById('a-cc');
            var o = document.getElementById('overlay-cc');
            var c = document.getElementById('c-cc');
            
            a.play().catch(function(){ a.load(); a.play(); });
            
            o.style.opacity = '0';
            setTimeout(function(){ 
                c.classList.add('active'); 
            }, 500);
            
            setTimeout(function(){ 
                o.style.display = 'none'; 
            }, 2000);
        }
    </script>
</div>
